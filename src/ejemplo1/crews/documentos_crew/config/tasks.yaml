tarea_documentos:
  description: >
    Atiende la siguiente petición relacionada con documentos:
    {peticion}

    PROCESO OBLIGATORIO — sigue estos pasos en orden:
    1. Llama a buscar_documentos con las palabras clave relevantes para identificar los archivos.
    2. Para CADA archivo relevante encontrado, llama a leer_documento usando EXACTAMENTE
       el nombre de archivo tal como aparece en los resultados de buscar_documentos (incluyendo extensión).
       NO inventes ni supongas nombres de archivo. NO uses herramientas que no sean las listadas aquí.
       Si la petición implica comparar dos entidades, DEBES leer un documento de cada una.
    3. Una vez leído el contenido, analiza y responde:
       - Si piden un dato CONCRETO (fecha, nombre, número, etc.): responde en UNA sola frase con el dato y el documento fuente. Sin secciones ni markdown adicional.
       - Si piden un RESUMEN: sintetiza los puntos clave en 3-5 párrafos.
       - Si piden información ESPECÍFICA: extrae solo los datos relevantes.
       - Si piden COMPARACIÓN: lee AMBOS documentos con leer_documento y luego elabora la comparación basándote en el contenido leído. NUNCA respondas una comparación sin haber leído primero los documentos de ambas entidades.
       - Si piden BÚSQUEDA: lista los documentos y explica su relevancia.
    
    4. IMPORTANTE: Si el contenido está truncado, procesa TODA la información disponible.
       No te disculpes por el truncado, simplemente trabaja con lo que tienes.
       NUNCA respondas diciendo que no puedes acceder al contenido si aún no has llamado a leer_documento.
    
    Basa tu análisis ÚNICAMENTE en el contenido real de los documentos.
    No inventes ni asumas información que no esté presente.
    Si no encuentras el documento o la información, indícalo claramente.
  expected_output: >
    Adapta la extensión de la respuesta al tipo de petición:
    - Dato concreto (fecha, nombre, cifra, etc.): UNA sola frase con el dato y el documento fuente. Sin encabezados ni secciones.
    - Resumen: 3-5 párrafos en markdown con los puntos clave.
    - Búsqueda: lista con breve descripción de relevancia.
    - Comparación: tabla o lista con diferencias y similitudes principales.
    NUNCA te disculpes por limitaciones, simplemente analiza lo que tienes.
  agent: agente_documentos